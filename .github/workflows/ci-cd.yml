name: CI/CD — Appointment Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  ci:
    name: 🧪 CI — Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: 🧪 Ejecutar pruebas con cobertura
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEMED_SERVICE_URL: http://localhost:3006
          NOTIFICATION_SERVICE_URL: http://localhost:3007
          INTERNAL_SERVICE_KEY: petwell_internal_secret

      - name: 🏗️ Compilar TypeScript → JavaScript
        run: npm run build

      - name: 📊 Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-appointment
          path: coverage/
          retention-days: 7

  deploy:
    name: 🚀 Deploy → Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🚂 Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy en Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: ✅ Deploy completado
        run: echo "🎉 Appointment Service desplegado en Railway"
